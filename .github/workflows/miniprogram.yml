name: 小程序构建与上传

# 触发：推送到 miniprogram 分支、打 tag（v*）、手动
on:
  push:
    branches: [miniprogram]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wx-miniprogram:
    name: 微信小程序构建与上传
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: 类型检查
        run: pnpm run check

      - name: 构建微信小程序
        env:
          # 云开发环境 ID：未配置则禁用云同步，回退纯本地存储
          CLOUD_ENV_ID: ${{ secrets.CLOUD_ENV_ID }}
        run: pnpm run build:wx

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: tuilemei-weapp
          path: dist/weapp
          retention-days: 30

      - name: 上传到微信后台
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
          WX_PRIVATE_KEY_BASE64: ${{ secrets.WX_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$WX_APPID" ]; then
            echo "::warning::未配置 WX_APPID，进入模拟上传模式"
            MOCK_UPLOAD=true node scripts/upload-wx.mjs
            exit 0
          fi

          # 优先使用 base64 编码的私钥（避免 GitHub Secret 换行符丢失导致 PEM 解码失败）
          if [ -n "$WX_PRIVATE_KEY_BASE64" ]; then
            echo "$WX_PRIVATE_KEY_BASE64" | base64 -d > private.key
          elif [ -n "$WX_PRIVATE_KEY" ]; then
            printf '%s\n' "$WX_PRIVATE_KEY" > private.key
          else
            echo "::warning::未配置微信私钥，进入模拟上传模式"
            MOCK_UPLOAD=true node scripts/upload-wx.mjs
            exit 0
          fi

          # 诊断信息：检查私钥是否为合法 PEM
          echo "私钥行数：$(wc -l < private.key)"
          head -1 private.key
          if ! grep -q "BEGIN" private.key; then
            echo "::error::私钥文件缺少 BEGIN 标记，请用 base64 编码后存为 WX_PRIVATE_KEY_BASE64"
            rm -f private.key
            exit 1
          fi

          # miniprogram-ci 依赖 @babel/preset-env/browserslist/less 等，
          # 在 pnpm 严格隔离结构下深路径 require 会失败。
          # 用独立目录 + npm install 搭建扁平 node_modules，彻底规避该问题。
          mkdir -p ci-upload
          cp scripts/upload-wx.mjs ci-upload/
          cd ci-upload
          npm init -y >/dev/null
          # miniprogram-ci@1.9.27 自带 less@4.6.7（在 miniprogram-ci/node_modules/less/），
          # 4.6.7 的 package.json 带有 exports 字段，Node 22 严格执行后 require('less/lib/less')
          # 这类深路径被拦截（Node 24 较宽松所以本地复现不出来）。
          # 用 less@3.13.1（无 exports 限制）替换 4.6.7，保证深路径可达。
          npm install miniprogram-ci@1.9.27 less@3.13.1 >/dev/null 2>&1
          rm -rf node_modules/miniprogram-ci/node_modules/less
          ln -s ../../less node_modules/miniprogram-ci/node_modules/less
          echo "miniprogram-ci 安装完成: $(ls node_modules/miniprogram-ci/package.json && echo OK)"
          echo "顶层 less 版本: $(node -p "require('less/package.json').version")"
          echo "miniprogram-ci 内 less 版本: $(node -p "require('node_modules/miniprogram-ci/node_modules/less/package.json').version")"
          echo "miniprogram-ci 内 lib/less/index.js: $(test -f node_modules/miniprogram-ci/node_modules/less/lib/less/index.js && echo YES || echo NO)"
          echo "从 miniprogram-ci/dist 内 require('less/lib/less'): $(cd node_modules/miniprogram-ci/dist && node -e "try{require('less/lib/less');console.log('OK');}catch(e){console.log('FAIL:',e.message)}")"

          WX_APPID="$WX_APPID" \
          WX_PRIVATE_KEY_PATH=../private.key \
          WX_PROJECT_PATH=../dist/weapp \
          WX_VERSION="$(node -p "require('../package.json').version")" \
          node upload-wx.mjs
          cd ..
          rm -rf ci-upload private.key
