name: 构建部署流水线

# 跨平台 CI/CD：Web 部署到 GitHub Pages + Android APK + iOS 构建验证
# 触发：推送到 main、打 tag（v*）、手动
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Pages 部署需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一条部署，避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Job 1: Web 构建并部署到 GitHub Pages
  # ----------------------------------------------------------------
  web-deploy:
    name: Web 构建与部署
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 类型检查
        run: pnpm run check

      - name: 构建
        run: pnpm run build

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 部署到 GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ----------------------------------------------------------------
  # Job 2: Android Debug APK 打包
  # ----------------------------------------------------------------
  android-build:
    name: Android APK 打包
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Web 资源
        run: pnpm run build

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步 Web 资源到原生工程
        run: npx cap sync android

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: tuilemei-android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ----------------------------------------------------------------
  # Job 3: iOS 构建验证（模拟器，无需开发者账号签名）
  # ----------------------------------------------------------------
  ios-build:
    name: iOS 构建验证
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Web 资源
        run: pnpm run build

      - name: 添加 iOS 平台
        run: npx cap add ios

      - name: 同步 Web 资源到原生工程
        run: npx cap sync ios

      - name: 构建 iOS App（模拟器，无签名）
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: 上传 .app 产物
        uses: actions/upload-artifact@v4
        with:
          name: tuilemei-ios-app
          path: ios/App/build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 30
